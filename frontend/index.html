<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover" />
    <title>EcoTrack - Huella de Carbono</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <script>
      (function() {
        var k = 'ecotrack-theme';
        var s = localStorage.getItem(k);
        if (s === 'dark' || s === 'light') document.documentElement.className = s;
        else if (window.matchMedia('(prefers-color-scheme: dark)').matches) document.documentElement.className = 'dark';
        else document.documentElement.className = 'light';
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
